<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kun.log - 프레젠테이션 모음</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
            font-weight: 300;
        }

        .presentations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .presentation-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .presentation-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header h3 {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body p {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .card-footer {
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 36px;
            }

            .presentations {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>kun.log</h1>
            <p>프레젠테이션 모음</p>
        </header>

        <div class="presentations">
            <a href="presentation-sample.html" class="presentation-card">
                <div class="card-header">
                    <h3>샘플 프레젠테이션</h3>
                </div>
                <div class="card-body">
                    <p>Reveal.js를 활용한 첫 번째 프레젠테이션입니다. 화살표 키로 네비게이션할 수 있습니다.</p>
                    <div class="card-footer">
                        <span>2026년 5월</span>
                        <span class="btn" style="padding: 6px 12px;">보기</span>
                    </div>
                </div>
            </a>

            <div class="presentation-card" style="opacity: 0.5;">
                <div class="card-header">
                    <h3>+ 새 프레젠테이션</h3>
                </div>
                <div class="card-body">
                    <p>새로운 프레젠테이션을 추가하세요. <code>presentation-*.html</code> 파일을 생성하고 index.html에 링크를 추가하면 됩니다.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
